# Docker 环境配置
mallchat:
  mysql:
    ip: mysql
    port: 3306
    db: mallchat
    username: root
    password: 123456
  redis:
    host: redis
    port: 6379
    password: 123456
  jwt:
    secret: docker-dev-secret-not-for-production
  wx:
    callback: http://localhost:8080
    appId: placeholder
    secret: placeholder
    token: placeholder
    aesKey: placeholder
  chatgpt:
    use: false
    uid: 10001
    key: placeholder
    proxyUrl: https://placeholder.cc
  chatglm2:
    use: false
    url: http://placeholder.cc
    uid: 10002

spring:
  redis:
    host: redis
    port: 6379
    password: 123456

rocketmq:
  name-server: rocketmq-namesrv:9876
  access-key: root
  secret-key: 123456

oss:
  enabled: true
  type: minio
  endpoint: http://minio:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: default

logging:
  level:
    root: INFO
