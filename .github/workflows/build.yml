name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Compile main module
        run: ./mvnw compile -pl mallchat-chat-server -am -B

      - name: Test compile
        run: ./mvnw test-compile -pl mallchat-chat-server -am -B
